{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-8">
    <div class="text-center mb-8">
        <i class="fa-solid fa-user-lock text-4xl text-healthcare-blue mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
        <p class="text-gray-500 mt-2">Log in to view your health predictions.</p>
    </div>

    <form method="POST" action="/login" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
            <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-healthcare-blue outline-none transition" placeholder="you@example.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-red-500">*</span></label>
            <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-healthcare-blue outline-none transition" placeholder="••••••••">
        </div>
        
        <button type="submit" class="w-full bg-healthcare-blue text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow">
            Sign In
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-600">
        Don't have an account? <a href="/register" class="text-healthcare-blue font-semibold hover:underline">Register here</a>
    </div>

    <!-- Continue as Guest -->
    <div class="mt-8 border-t border-gray-100 pt-6">
        <a href="/prediction" class="w-full block text-center bg-gray-50 hover:bg-gray-100 text-gray-700 py-3 rounded-lg font-medium border border-gray-200 transition">
            Continue as Guest <span class="text-gray-500 text-xs ml-1">(No history tracking)</span>
        </a>
    </div>
</div>
{% endblock %}
