{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 p-8">
    <div class="text-center mb-8">
        <i class="fa-solid fa-user-plus text-4xl text-healthcare-blue mb-4"></i>
        <h2 class="text-3xl font-bold text-gray-900">Create Account</h2>
        <p class="text-gray-500 mt-2">Join to track your heart health over time.</p>
    </div>

    <form method="POST" action="/register" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Full Name <span class="text-red-500">*</span></label>
            <input type="text" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-healthcare-blue outline-none" placeholder="John Doe">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-red-500">*</span></label>
            <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-healthcare-blue outline-none" placeholder="you@example.com">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-red-500">*</span></label>
            <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-healthcare-blue outline-none" placeholder="••••••••">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password <span class="text-red-500">*</span></label>
            <input type="password" name="confirm_password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-healthcare-blue outline-none" placeholder="••••••••">
        </div>
        
        <button type="submit" class="w-full bg-healthcare-blue text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition shadow mt-2">
            Create Account
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-600">
        Already have an account? <a href="/login" class="text-healthcare-blue font-semibold hover:underline">Log in</a>
    </div>
</div>
{% endblock %}
